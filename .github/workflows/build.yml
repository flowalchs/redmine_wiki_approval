name: build
on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.redmine }} ${{ matrix.db }} ruby-${{ matrix.ruby }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.2', '3.3', '3.4']
        redmine: ['6.1-stable', 'master']
        db: ['postgres', 'mysql']
        include:
          # Redmine 4.2 mit Ruby 2.6/2.7
          - redmine: '4.2-stable'
            ruby: '2.6'
            db: 'postgres'
          - redmine: '4.2-stable'
            ruby: '2.6'
            db: 'mysql'
          - redmine: '4.2-stable'
            ruby: '2.7'
            db: 'postgres'
          - redmine: '4.2-stable'
            ruby: '2.7'
            db: 'mysql'
          # Redmine 5.1 mit Ruby 2.7/3.2
          - redmine: '5.1-stable'
            ruby: '2.7'
            db: 'postgres'
          - redmine: '5.1-stable'
            ruby: '2.7'
            db: 'mysql'
          - redmine: '5.1-stable'
            ruby: '3.2'
            db: 'postgres'
          - redmine: '5.1-stable'
            ruby: '3.2'
            db: 'mysql'

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 'BestPasswordEver'
        ports:
          - 3306/tcp
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Verify MySQL connection from host
        run: |
          mysql --host 127.0.0.1 --port ${{ job.services.mysql.ports[3306] }} -uroot -pBestPasswordEver -e "SHOW DATABASES"
        if: matrix.db == 'mysql'

      - name: Checkout Redmine
        uses: actions/checkout@v5
        with:
          repository: redmine/redmine
          ref: ${{ matrix.redmine }}
          path: redmine

      - name: Checkout redmine_wiki_approval
        uses: actions/checkout@v5
        with:
          repository: FloWalchs/redmine_wiki_approval
          path: redmine/plugins/redmine_wiki_approval

      - name: Update package archives
        run: sudo apt-get update --yes --quiet

      - name: Install package dependencies
        run: >
          sudo apt-get install --yes --quiet
          build-essential
          cmake
          libicu-dev
          libpq-dev
          libmysqlclient-dev

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Prepare Redmine source
        working-directory: redmine
        run: |
          cp plugins/redmine_wiki_approval/test/support/database-${{ matrix.db }}.yml config/database.yml
          cp plugins/redmine_wiki_approval/test/support/configuration.yml config/configuration.yml

      - name: Patch Gemfile for Redmine 4.2 (blankslate, simplecov)
        if: matrix.redmine == '4.2-stable'
        shell: bash
        working-directory: redmine
        run: |
          grep -q "gem 'blankslate'" Gemfile || echo "gem 'blankslate', '~> 3.1.3'" >> Gemfile
          sed -i "s/gem 'simplecov', '~> 0.18.5', :require => false/gem 'simplecov', '~> 0.19', :require => false/" Gemfile

      - name: Install Ruby dependencies
        working-directory: redmine
        run: |
          bundle config set --local without 'development'
          bundle install --jobs=4 --retry=3

      - name: Run Redmine rake tasks
        env:
          RAILS_ENV: test
          MYSQL_PORT: ${{ job.services.mysql.ports[3306] }}
        working-directory: redmine
        run: |
          bundle exec rake generate_secret_token
          bundle exec rake db:create db:migrate redmine:plugins:migrate

      - name: Run tests with coverage
        env:
          RAILS_ENV: test
          MYSQL_PORT: ${{ job.services.mysql.ports[3306] }}
          COVERAGE: "1"
        working-directory: redmine
        run: bundle exec rake redmine:plugins:test NAME=redmine_wiki_approval

      - name: Run uninstall test
        env:
          RAILS_ENV: test
          MYSQL_PORT: ${{ job.services.mysql.ports[3306] }}
        working-directory: redmine
        run: bundle exec rake redmine:plugins:migrate NAME=redmine_wiki_approval VERSION=0
        
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
        
